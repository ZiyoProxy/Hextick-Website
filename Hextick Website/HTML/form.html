<!DOCTYPE html> <!--Declares the document type as HTML5-->
<html>
    <head>
        <!--Contains meta data and references for the HTML document-->
        <title>Contact form</title><!--Specifies the title of the document-->
        <meta name="author" content="Hrishav Tandukar">
        <meta name="Description" content="HTML Document">
        <meta name="Keywords" content="HTML">  
        <link rel="stylesheet" href="/css/style.css"> 

        <style>
            *{
                padding: 0;
                margin: 0;
                box-sizing: border-box;
            
            }
            
            body{
                font-family:'Segoe UI', Tahoma, Verdana, sans-serif;
                background:black;
            }
            .contact{
                height:600px;
                width: 400px;
                position: relative;
                top: 10%;
                left: 40%;
                margin-top: 0%;
                margin-bottom: 200px;
                padding-left:48px;
                align-items: center;
                display: flex;
                box-shadow:none;
                border: solid white;
                border-radius: 15px;
            }
            .contact-left{
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
            .contact-left-title h2{
                font-weight: 600;
                color: white;
                font-size: 30px;
                margin-bottom: 8px;
                text-shadow: none;
            } 
            .contact-left-title hr{
                border: none;
                width: 100%;
                height: 1.2px;
                background-color: white;
            }
            
            .contact-details{
                width: 300px;
                height: 50px;
                padding-left: 35px;
                color: white;
                border-radius: 50px;
                background:transparent;
                box-shadow: none;
            
            
            }
            .contact-left textarea{
                height: 140px;
                padding-top: 15px;
                border-radius: 20px;
            
            }
            
            .contact-inputs::placeholder{
                color: white;
            }
            .contact-left button{
                display: flex;
                align-items: center;
                padding: 12px 30px;
                font-size: 17px;
                color: white;
                gap: 10px;
                border-color:  white;
                border-radius: 50px;
                background: transparent;
            
            
            }
            </style>
    </head>
    <body>
        <script src="js/script.js"></script>
        <header>
            <!--this is to create a nav bar-->
            <div class="header">
                <div class="line"></div> <!--this add a line on the sides of the logo-->
                <div class="logo">HEXTICK</div>
                <div class="line"></div>
    
                <nav class="nav-links">
                    <a href="/index.html">Home</a>
                    <a href="/HTML/products.html">Products</a>
                    <a href="/HTML/blog.html">Blog</a>
                    <a href="/HTML/research.html">Research</a>
                    <a href="/HTML/aboutUs.html">About Us</a>  
                    <a href="/HTML/form.html">Form</a>    
                </nav>
            </div>
    
                <div id="date-time" class="date-time"></div>
            </header>


        <div class="contact">
            <form name="messageform" class="contact-left" onsubmit=" return validateform()">
                <div class="contact-left-title">
                    <h2>Become a Subscriber</h2>
                 <hr>
                </div>
                <label class="head" for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" class="contact-details">
                <label class="head" for="email">Email</label>
                <input type="email" id="email" email="email" placeholder="Your Gmail ID" class="contact-details">
                <label class="head" for="message">Notes</label>
                <textarea id="message" name="message" placeholder="Message For Us" class="contact-details"></textarea>
                <button type="submit">Subscribe</button>

      
            </form>

        </div>
     
</style>

   <script>
    function validateform(){
        var name = document.forms["messageform"]["name"].value;
        var email = document.forms["messageform"]["email"].value;
        var message = document.forms["messageform"]["message"].value;
        
     if(name === '' || email === '' || message === '' )
     {
        alert("Empty Field are present!! Please enter the Values...");
        return false;
     }
     else
     {
        alert("Thankyou For Subscribing!! We'll follow up with you shortly.");
        return true;
     }

 }
   </script>
    </body>



    <footer style="color:white" > &copy; 2025 HEXTICK. All rights reserved.</footer> <!-- Copyright information. -->

</html>
